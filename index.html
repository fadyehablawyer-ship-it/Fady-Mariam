    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-gold: #AA7C11;
            --light-gold: #F3E5AB;
            --bg-offwhite: #FAFAFA;
            --text-dark: #2C2C2C;
            --text-muted: #666666;
            --font-arabic: 'Cairo', sans-serif;
            --font-serif: 'Amiri', serif;
            --font-english: 'Cinzel', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-arabic);
            background-color: var(--bg-offwhite);
            color: var(--text-dark);
            overflow-x: hidden;
            background-image: radial-gradient(circle, rgba(212,175,55,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Reusable Components */
        .gold-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--primary-gold), var(--dark-gold));
            color: #fff;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: var(--font-arabic);
        }

        .gold-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212,175,55,0.5);
        }

        .section-title {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            color: var(--dark-gold);
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .section-title::after {
            content: "👑";
            display: block;
            font-size: 1.2rem;
            margin-top: 5px;
        }

        /* 1. Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)), url('https://i.postimg.cc/p9dQF3TD/gallery1-JPG.jpg') no-repeat center center/cover;
            color: #fff;
            padding: 20px;
        }

        .hero-names {
            font-family: var(--font-english);
            font-size: 4rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--light-gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 2s ease-in-out;
        }

        .hero-sub {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-style: italic;
            margin-bottom: 20px;
            color: var(--light-gold);
        }
